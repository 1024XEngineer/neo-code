<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="white" font-size="16" font-weight="700">NeoCode — C4 Level 1 系统上下文图</text>
  <text x="30" y="54" fill="#94a3b8" font-size="10" font-weight="400">System Context Diagram</text>

  <!-- ==================== USERS (LEFT) ==================== -->

  <!-- 终端开发者 -->
  <rect x="30" y="90" width="175" height="55" rx="8" fill="#0f172a"/>
  <rect x="30" y="90" width="175" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="117" y="114" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">终端开发者</text>
  <text x="117" y="132" fill="#94a3b8" font-size="8" text-anchor="middle">Terminal Developer</text>

  <!-- Web/桌面用户 -->
  <rect x="30" y="175" width="175" height="55" rx="8" fill="#0f172a"/>
  <rect x="30" y="175" width="175" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="117" y="199" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">Web / 桌面用户</text>
  <text x="117" y="217" fill="#94a3b8" font-size="8" text-anchor="middle">Web / Desktop User</text>

  <!-- IM 用户 -->
  <rect x="30" y="260" width="175" height="55" rx="8" fill="#0f172a"/>
  <rect x="30" y="260" width="175" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="117" y="284" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">IM 用户</text>
  <text x="117" y="302" fill="#94a3b8" font-size="8" text-anchor="middle">Feishu / IM User</text>

  <!-- CI/CD 流水线 -->
  <rect x="30" y="345" width="175" height="55" rx="8" fill="#0f172a"/>
  <rect x="30" y="345" width="175" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="117" y="369" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">CI/CD 流水线</text>
  <text x="117" y="387" fill="#94a3b8" font-size="8" text-anchor="middle">CI/CD Pipeline</text>

  <!-- "人类用户" label -->
  <rect x="30" y="70" width="175" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="117" y="81" fill="#64748b" font-size="7" text-anchor="middle">人类用户 / 自动化调用方</text>

  <!-- ==================== ARROWS: Users → NeoCode ==================== -->
  <path d="M 205 117 L 275 117" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <path d="M 205 202 L 275 202" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <path d="M 205 287 L 275 287" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <path d="M 205 372 L 275 372" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>

  <!-- ==================== NEOCODE SYSTEM BOUNDARY ==================== -->
  <rect x="280" y="55" width="470" height="395" rx="12" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="292" y="72" fill="#94a3b8" font-size="10" font-weight="600">NeoCode System（本地 AI Coding Agent）</text>

  <!-- Internal: Gateway -->
  <rect x="305" y="95" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="305" y="95" width="200" height="55" rx="6" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="405" y="119" fill="#fb923c" font-size="11" font-weight="600" text-anchor="middle">Gateway</text>
  <text x="405" y="137" fill="#94a3b8" font-size="8" text-anchor="middle">RPC 路由 · 流中继 · 多端接入</text>

  <!-- Internal: Runtime -->
  <rect x="305" y="180" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="305" y="180" width="200" height="55" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="405" y="204" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">Runtime</text>
  <text x="405" y="222" fill="#94a3b8" font-size="8" text-anchor="middle">ReAct 循环 · 事件编排 · 权限</text>

  <!-- Internal: Provider -->
  <rect x="305" y="265" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="305" y="265" width="200" height="55" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="405" y="289" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">Provider</text>
  <text x="405" y="307" fill="#94a3b8" font-size="8" text-anchor="middle">多模型厂商协议适配</text>

  <!-- Internal: Tools -->
  <rect x="305" y="350" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="305" y="350" width="200" height="55" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="405" y="374" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Tools</text>
  <text x="405" y="392" fill="#94a3b8" font-size="8" text-anchor="middle">工具执行 · 安全策略引擎</text>

  <!-- Internal arrows -->
  <path d="M 405 150 L 405 180" fill="none" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-slate)"/>
  <path d="M 405 235 L 405 265" fill="none" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-slate)"/>
  <path d="M 405 320 L 405 350" fill="none" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-slate)"/>
  <path d="M 505 207 L 520 207 L 520 292 L 505 292" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-slate)"/>

  <!-- ==================== ARROWS: NeoCode → External ==================== -->
  <path d="M 750 155 L 825 155" fill="none" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow-violet)"/>
  <path d="M 750 240 L 825 240" fill="none" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow-violet)"/>
  <path d="M 750 320 L 825 320" fill="none" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow-violet)"/>
  <path d="M 750 370 L 825 370" fill="none" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow-violet)"/>

  <!-- ==================== EXTERNAL SYSTEMS (RIGHT) ==================== -->

  <!-- LLM Providers -->
  <rect x="830" y="90" width="195" height="55" rx="6" fill="#0f172a"/>
  <rect x="830" y="90" width="195" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="927" y="114" fill="white" font-size="10" font-weight="600" text-anchor="middle">模型厂商 API</text>
  <text x="927" y="132" fill="#94a3b8" font-size="8" text-anchor="middle">Anthropic · OpenAI · Gemini · ...</text>

  <!-- MCP Servers -->
  <rect x="830" y="175" width="195" height="55" rx="6" fill="#0f172a"/>
  <rect x="830" y="175" width="195" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="927" y="199" fill="white" font-size="10" font-weight="600" text-anchor="middle">MCP 服务器</text>
  <text x="927" y="217" fill="#94a3b8" font-size="8" text-anchor="middle">外部工具 · stdio 子进程</text>

  <!-- Git -->
  <rect x="830" y="260" width="195" height="55" rx="6" fill="#0f172a"/>
  <rect x="830" y="260" width="195" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="927" y="284" fill="white" font-size="10" font-weight="600" text-anchor="middle">本地 Git</text>
  <text x="927" y="302" fill="#94a3b8" font-size="8" text-anchor="middle">版本信息 · Diff · Blame</text>

  <!-- Shell -->
  <rect x="830" y="345" width="195" height="55" rx="6" fill="#0f172a"/>
  <rect x="830" y="345" width="195" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="927" y="369" fill="white" font-size="10" font-weight="600" text-anchor="middle">操作系统 Shell</text>
  <text x="927" y="387" fill="#94a3b8" font-size="8" text-anchor="middle">bash · zsh · pwsh · ...</text>

  <!-- Feishu Open Platform -->
  <rect x="830" y="495" width="195" height="55" rx="6" fill="#0f172a"/>
  <rect x="830" y="495" width="195" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="927" y="519" fill="white" font-size="10" font-weight="600" text-anchor="middle">飞书开放平台</text>
  <text x="927" y="537" fill="#94a3b8" font-size="8" text-anchor="middle">Webhook · 消息 API</text>

  <!-- Feishu webhook → NeoCode (reverse direction) -->
  <path d="M 830 522 L 750 522 L 750 430" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow-cyan)"/>
  <text x="790" y="510" fill="#94a3b8" font-size="7" text-anchor="middle">Webhook</text>

  <!-- "外部系统" label -->
  <rect x="830" y="70" width="195" height="16" rx="3" fill="none" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="927" y="81" fill="#64748b" font-size="7" text-anchor="middle">外部系统 / 外部服务</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="30" y="480" width="790" height="135" rx="8" fill="none" stroke="#1e293b" stroke-width="1"/>
  <text x="50" y="502" fill="#94a3b8" font-size="10" font-weight="600">图例</text>

  <rect x="50" y="515" width="20" height="14" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="80" y="526" fill="#94a3b8" font-size="9">用户 / 调用方</text>

  <rect x="200" y="515" width="20" height="14" rx="3" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="230" y="526" fill="#94a3b8" font-size="9">外部系统 / 服务</text>

  <rect x="370" y="515" width="60" height="14" rx="3" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="440" y="526" fill="#94a3b8" font-size="9">系统边界</text>

  <rect x="50" y="540" width="20" height="14" rx="3" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="80" y="551" fill="#94a3b8" font-size="9">连接/中继层</text>

  <rect x="200" y="540" width="20" height="14" rx="3" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="230" y="551" fill="#94a3b8" font-size="9">编排/服务层</text>

  <rect x="370" y="540" width="20" height="14" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="400" y="551" fill="#94a3b8" font-size="9">适配层</text>

  <rect x="500" y="540" width="20" height="14" rx="3" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
  <text x="530" y="551" fill="#94a3b8" font-size="9">工具/执行层</text>

  <text x="50" y="578" fill="#64748b" font-size="8">此图展示系统与外部世界的交互关系。内部模块详细结构参见 C4 Level 2 容器图（§7）。</text>
  <text x="50" y="593" fill="#64748b" font-size="8">飞书开放平台既作为客户端（Webhook 方向）也作为传出依赖（消息 API）。</text>
</svg>
