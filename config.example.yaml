# Example NeoCode configuration
# Running `go run ./cmd/neocode` will generate a similar file on first launch.

providers:
  - name: openai
    type: openai
    base_url: https://api.openai.com/v1
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY

  - name: local-proxy
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder
    api_key_env: OPENAI_API_KEY

selected_provider: openai
current_model: gpt-4.1-mini
workdir: .
shell: powershell
sessions_path: ~/.neocode/sessions.json
