# Example application configuration
app:
  name: "NeoCode"
  version: "1.0.0"

ai:
  provider: "openll" # modelscope | deepseek | openll | siliconflow | doubao | openai
  api_key: "AI_API_KEY" # environment variable name; falls back to AI_API_KEY when empty
  model: "gpt-5.4"

memory:
  top_k: 5
  min_match_score: 2.2
  max_prompt_chars: 1800
  max_items: 1000
  storage_path: "./data/memory_rules.json"
  # 显式项目记忆文件。默认兼容业界通用的 AGENTS.md。
  # 如需兼容仓库里已有的其他约定文件，可继续追加到列表末尾；
  # 系统按列表顺序加载，越靠前优先级越高。
  project_files:
    - "AGENTS.md" # 首选项目级约定文件；建议把仓库协作规则集中维护在这里。
  # 显式项目记忆注入到 prompt 时的最大字符数预算。
  project_prompt_chars: 2400
  # 记忆提取策略：rule | llm | auto。
  extractor: "rule"
  # 仅在 llm/auto 模式下使用；为空时默认复用 ai.model。
  extractor_model: ""
  # 单次 LLM 记忆提取请求的超时时间（秒），用于限制额外提取链路的等待时间。
  extractor_timeout_seconds: 20
  persist_types:
    - "user_preference"
    - "project_rule"
    - "code_fact"
    - "fix_recipe"

history:
  short_term_turns: 6
  max_tool_context_messages: 3
  max_tool_context_output_size: 4000
  persist_session_state: true
  workspace_state_dir: "./data/workspaces"
  resume_last_session: true

persona:
  file_path: "./configs/persona.txt"

# Notes:
# - Switching provider with /provider <name> resets ai.model to that provider's default model.
# - You can still override the current model at any time with /switch <model>.
